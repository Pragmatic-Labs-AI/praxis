name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Lets conformance/codex.conformance.test.ts validate emitted Codex
      # rules against the real tool instead of skipping (Tool-neutral rail).
      - run: npm install -g @openai/codex@0.144.6
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm run conformance
      # Self-hosting: Praxis's own emitted files must match its methodology source.
      - run: npm run selfcheck
